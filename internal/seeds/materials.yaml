- name: Tworzywa sztuczne
  code: TS
  items:
    - name: Tworzywa termoplastyczne
      code: TSTP
      desc: Tworzywa termoplastyczne miękną lub topią się pod wpływem ogrzewania.
      items:
          - code: TSTP01
            name: "Poliolefiny: polietylen (PE), polipropylen (PP)"
          - code: TSTP02
            name: Polichlorek winylu (PVC)
          - code: TSTP03
            name: "Termoplasty na bazie styrenu: polistyren (PS), kopolimer akrylonitrylo-butadienowo-styrenowy (ABS), kopolimer akrylonitrylo-styrenowo-akrylowy (ASA), kopolimer styrenowo-akrylonitrylowy (SAN)"
          - code: TSTP04
            name: Poliamidy (PA)
          - code: TSTP05
            name: Poliuretany (TPU)
          - code: TSTP06
            name: "Poliestry termoplastyczne: politereftalan butylenu (PBT), politereftalan etylenu (PET)"
          - code: TSTP07
            name: Poliacetal (POM)
          - code: TSTP10
            name: "Fluoropolimery: politetrafluoroetylen (PTFE)"
          - code: TSTP11
            name: "Inne tworzywa termoplastyczne: polimetakrylan metylu (PMMA)"
    - name: Tworzywa termoutwardzalne
      code: TSTT
      desc: Tworzywa termoutwardzalne, które nie miękną ani nie topią się pod wpływem ciepła.
      items:
        - code: TSTT01
          name: Poliestry nienasycone (żywice UPR)
        - code: TSTT02
          name: Żywica fenolowo-formaldehydowa (PF)
        - code: TSTT03
          name: Żywica epoksydowa (EP)
        - code: TSTT04
          name: Poliuretany termoutwardzalne (PUR)
    - name: Inne/Wzmocnienia
      code: TSWZ
      desc: Tworzywa sztuczne wzmocnione włóknami szklanymi, węglowymi, aramidowymi, z wełny mineralnej i naturalnej.
      items:
        - name: Włókna szklane i mata szklana
          code: TSWZ01
        - name: "Inne: włókna naturalne, włókna aramidowe, włókna węglowe, wypełniacze (kreda, talk), nanokompozyty"
          code: TSWZ02
